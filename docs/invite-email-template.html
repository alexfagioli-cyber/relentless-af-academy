<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're invited to RelentlessAF Academy</title>
</head>
<body style="margin: 0; padding: 0; background-color: #111827; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #111827;">
    <tr>
      <td align="center" style="padding: 48px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 480px;">
          <!-- Header -->
          <tr>
            <td style="padding-bottom: 32px;">
              <h1 style="margin: 0; font-size: 28px; font-weight: 700; color: #DC2626; letter-spacing: -0.5px;">
                RelentlessAF Academy
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding-bottom: 32px;">
              <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.6; color: #F9FAFB;">
                Alex has invited you to join RelentlessAF Academy — a personal AI training programme built for the people closest to him.
              </p>
              <p style="margin: 0; font-size: 16px; line-height: 1.6; color: #D1D5DB;">
                Click below to get started.
              </p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td style="padding-bottom: 40px;">
              <table role="presentation" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="border-radius: 8px; background-color: #DC2626;">
                    <a href="{{ .ConfirmationURL }}"
                       target="_blank"
                       style="display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600; color: #F9FAFB; text-decoration: none; border-radius: 8px;">
                      Accept Invitation
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="border-top: 1px solid #374151; padding-top: 24px;">
              <p style="margin: 0; font-size: 13px; color: #6B7280;">
                This invite expires in 30 days.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
